name: Sync to Hugging Face Space

on:
  push:
    branches: [main]

jobs:
  sync-hf-space:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      - name: Mirror to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://user:${HF_TOKEN}@https://huggingface.co/spaces/CHK-DSK-Labs/l-bom || git remote set-url hf https://user:${HF_TOKEN}@huggingface.co/spaces/CHK-DSK-Labs/l-bom
          git push hf main --force
